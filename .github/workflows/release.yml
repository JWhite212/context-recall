name: Release

on:
  push:
    tags:
      - 'v*'

# Least-privilege default for GITHUB_TOKEN. Build jobs only need to read
# the repository; the `release` job below overrides this to `contents: write`
# so it can publish a GitHub Release.
permissions:
  contents: read

jobs:
  build-daemon:
    runs-on: macos-14
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.lock pyinstaller

      # Only runs when APPLE_CERTIFICATE is configured; absent it, the
      # daemon signs ad-hoc via build_daemon.sh's existing fallback.
      - name: Import Developer ID certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/cr-signing.keychain-db"
          KPASS="$(uuidgen)"
          security create-keychain -p "$KPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPASS" "$KEYCHAIN"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          IDENT="$(security find-identity -v -p codesigning "$KEYCHAIN" | grep 'Developer ID Application' | head -1 | sed -E 's/.*"(.*)".*/\1/')"
          echo "CONTEXT_RECALL_SIGN_IDENTITY=$IDENT" >> "$GITHUB_ENV"
          # Also drive Tauri's codesign identity. Written to $GITHUB_ENV (not a
          # step-level env:) so it is set ONLY when a cert exists — a step-level
          # env that interpolates to "" is exported present-but-empty, which
          # Tauri reads via var_os as Some("") and would try to codesign --sign
          # "" (fails). Truly-unset makes Tauri fall back to the config's "-".
          echo "APPLE_SIGNING_IDENTITY=$IDENT" >> "$GITHUB_ENV"
          echo "==> Imported Developer ID identity: $IDENT"

      # build_daemon.sh (not raw pyinstaller) so CI gets the same layout the
      # inject script expects — dist/context-recall-daemon/Context Recall
      # Daemon.app — plus the stable signing identifier (its ad-hoc fallback
      # is load-bearing for cert-less CI). Raw pyinstaller leaves the .app at
      # dist/Context Recall Daemon.app and only the onedir payload at
      # dist/context-recall-daemon/, which is what broke the v0.3.0 release.
      - name: Build daemon binary
        run: ./scripts/build_daemon.sh

      # upload-artifact does not preserve symlinks, and the PyInstaller .app
      # is a relative-symlink farm (Frameworks/Resources cross-links). Ship
      # the bundle as a tarball so the symlinks survive the artifact
      # round-trip; inject_daemon.sh hard-fails if they are lost.
      - name: Package daemon bundle (tar preserves the symlink farm)
        run: tar -C dist/context-recall-daemon -czf daemon-bundle.tar.gz "Context Recall Daemon.app"

      - name: Upload daemon artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: context-recall-daemon
          path: daemon-bundle.tar.gz

  build-app:
    runs-on: macos-14
    needs: build-daemon
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      # Surfaced at job level so the notarize step's `if:` can require it —
      # a cert-without-API-key config then skips notarization (and still
      # uploads the signed DMG) instead of hard-failing the release.
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download daemon artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: context-recall-daemon
          path: ${{ runner.temp }}/daemon-artifact

      # Populate the Tauri resource directory declared in tauri.conf.json.
      # The Tauri copier will mangle this copy's symlinks inside the bundled
      # app; that copy is replaced wholesale by inject_daemon.sh below.
      - name: Unpack daemon into Tauri resources
        run: |
          mkdir -p ui/src-tauri/resources/context-recall-daemon
          tar -xzf "$RUNNER_TEMP/daemon-artifact/daemon-bundle.tar.gz" \
            -C ui/src-tauri/resources/context-recall-daemon

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install frontend dependencies
        run: cd ui && npm ci

      # Only runs when APPLE_CERTIFICATE is configured; absent it, the
      # outer app signs ad-hoc via Tauri's existing "-" config below.
      - name: Import Developer ID certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/cr-signing.keychain-db"
          KPASS="$(uuidgen)"
          security create-keychain -p "$KPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPASS" "$KEYCHAIN"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          IDENT="$(security find-identity -v -p codesigning "$KEYCHAIN" | grep 'Developer ID Application' | head -1 | sed -E 's/.*"(.*)".*/\1/')"
          echo "CONTEXT_RECALL_SIGN_IDENTITY=$IDENT" >> "$GITHUB_ENV"
          # Also drive Tauri's codesign identity. Written to $GITHUB_ENV (not a
          # step-level env:) so it is set ONLY when a cert exists — a step-level
          # env that interpolates to "" is exported present-but-empty, which
          # Tauri reads via var_os as Some("") and would try to codesign --sign
          # "" (fails). Truly-unset makes Tauri fall back to the config's "-".
          echo "APPLE_SIGNING_IDENTITY=$IDENT" >> "$GITHUB_ENV"
          echo "==> Imported Developer ID identity: $IDENT"

      # APPLE_SIGNING_IDENTITY is inherited from $GITHUB_ENV (set by the
      # cert-import step) only when a Developer ID cert is configured.
      - name: Build Tauri app
        run: cd ui && npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        if: ${{ env.TAURI_SIGNING_PRIVATE_KEY != '' }}

      # Runs when the Tauri updater key is absent. It still inherits
      # APPLE_SIGNING_IDENTITY from $GITHUB_ENV when a Developer ID cert is
      # configured, so the app and its nested frameworks are signed Developer
      # ID + Hardened Runtime even on this no-updater-key path (otherwise
      # inject_daemon.sh re-seals only the outer app and notarization rejects
      # the ad-hoc nested Mach-Os). No cert → the var is never written → Tauri
      # falls back to the config's "-" (ad-hoc), unchanged from today.
      - name: Build Tauri app (unsigned)
        run: cd ui && npm run tauri build
        if: ${{ !env.TAURI_SIGNING_PRIVATE_KEY }}

      # The Tauri resource copier destroys the symlink farm inside the
      # PyInstaller daemon bundle (the daemon then dies at bootstrap with
      # "No module named '_struct'"). Re-inject the pristine bundle with
      # a symlink-preserving copy and regenerate the DMG from the fixed
      # app. Extract straight from the tarball into the layout
      # build_daemon.sh produces locally, so the inject script finds it.
      - name: Re-inject daemon bundle and rebuild DMG
        run: |
          mkdir -p dist/context-recall-daemon
          tar -xzf "$RUNNER_TEMP/daemon-artifact/daemon-bundle.tar.gz" \
            -C dist/context-recall-daemon
          ./scripts/inject_daemon.sh "ui/src-tauri/target/release/bundle/macos/Context Recall.app"
          rm -f ui/src-tauri/target/release/bundle/dmg/*.dmg
          hdiutil create -volname "Context Recall" \
            -srcfolder "ui/src-tauri/target/release/bundle/macos/Context Recall.app" \
            -ov -format UDZO \
            "ui/src-tauri/target/release/bundle/dmg/Context Recall_injected_aarch64.dmg"

      - name: Notarize and staple DMG
        if: ${{ env.APPLE_CERTIFICATE != '' && env.APPLE_API_KEY_P8 != '' }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
        run: |
          echo -n "$APPLE_API_KEY_P8" | base64 --decode -o "$RUNNER_TEMP/AuthKey.p8"
          export APPLE_API_KEY_P8_PATH="$RUNNER_TEMP/AuthKey.p8"
          ./scripts/notarize_and_staple.sh \
            "ui/src-tauri/target/release/bundle/dmg/Context Recall_injected_aarch64.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: macos-dmg
          path: ui/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload updater artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: updater-files
          path: |
            ui/src-tauri/target/release/bundle/macos/*.tar.gz
            ui/src-tauri/target/release/bundle/macos/*.tar.gz.sig
            ui/src-tauri/target/release/bundle/macos/latest.json
        if: ${{ env.TAURI_SIGNING_PRIVATE_KEY != '' }}

  release:
    runs-on: ubuntu-latest
    needs: build-app
    permissions:
      contents: write
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-dmg
          path: artifacts/

      - name: Download updater files
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: updater-files
          path: artifacts/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
